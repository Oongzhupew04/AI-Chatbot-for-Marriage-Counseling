<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - MarriageCounselor.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard/modals/thankyou.css') }}">
</head>
<body>
    <!-- We keep the ID here so your JavaScript can still find it to open it -->
    <div id="thank-you-modal" class="thank-you-overlay">
        <div class="thank-you-container">
            <i class="fas fa-check-circle thank-you-icon"></i>
            <h2 class="thank-you-heading">Session Ended</h2>
            <p class="thank-you-text">Thank you for sharing with us today.</p>
        </div>
    </div>
</body>
<script>
    const thankYouModal = document.getElementById("thank-you-modal");

    function openThankYouModal() {
        thankYouModal.style.display = 'flex';
    }

    function closeThankYouModal() {
        thankYouModal.style.display = 'none';
    }
</script>

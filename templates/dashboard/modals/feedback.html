<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Feedback - MarriageCounselor.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard/modals/feedback.css') }}">
</head>
<body>
    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-container">
            
            <div class="modal-header">
                <div class="header-text">
                    <h2>Session Feedback</h2>
                    <p>Help us improve Counselor.AI for you.</p>
                </div>
                <button class="close-btn" onclick="closeFeedback()"><i class="fas fa-times"></i></button>
            </div>

            <div class="modal-body">
                
                <div class="feedback-card">
                    <div class="card-header" style="text-align: center;">
                        <h3>How helpful was this session?</h3>
                        <span>Rate the advice and empathy provided.</span>
                    </div>
                    
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Excellent"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Good"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Average"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Poor"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Very Bad"><i class="fas fa-star"></i></label>
                    </div>
                </div>

                <div class="feedback-card">
                    <div class="card-header">
                        <h3><span class="step-num">2</span> What worked well?</h3>
                        <span>Select all that apply.</span>
                    </div>

                    <div class="chip-group">
                        <input type="checkbox" id="good-empathy" class="chip-input">
                        <label for="good-empathy" class="chip-label">❤️ Felt Understood</label>
                        
                        <input type="checkbox" id="good-advice" class="chip-input">
                        <label for="good-advice" class="chip-label">💡 Actionable Advice</label>
                        
                        <input type="checkbox" id="good-tone" class="chip-input">
                        <label for="good-tone" class="chip-label">🗣️ Calming Tone</label>
                        
                        <input type="checkbox" id="good-privacy" class="chip-input">
                        <label for="good-privacy" class="chip-label">🔒 Felt Safe</label>
                    </div>
                </div>

                <div class="feedback-card">
                    <div class="card-header">
                        <h3><span class="step-num">3</span> Any issues?</h3>
                        <span>Help us fix bugs in the AI logic.</span>
                    </div>

                    <div class="chip-group">
                        <input type="checkbox" id="bad-robot" class="chip-input">
                        <label for="bad-robot" class="chip-label">🤖 Too Robotic</label>
                        
                        <input type="checkbox" id="bad-repeat" class="chip-input">
                        <label for="bad-repeat" class="chip-label">🔁 Repetitive</label>
                        
                        <input type="checkbox" id="bad-context" class="chip-input">
                        <label for="bad-context" class="chip-label">❓ Misunderstood Context</label>
                    </div>
                </div>

                <div class="feedback-card">
                    <div class="card-header">
                        <h3><span class="step-num">4</span> Additional Comments</h3>
                        <span>Share specific details (Optional).</span>
                    </div>

                    <textarea class="text-area" placeholder="The AI was great, but it forgot that I mentioned..."></textarea>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="closeFeedback()">Cancel</button>
                <button class="btn-primary" onclick="submitFeedback()">Submit Feedback</button>
            </div>

        </div>
    </div>
</body>

<script>
    function closeFeedback() {
        // document.getElementById("feedback-modal").style.display = "none";
        window.location.href = "{{ url_for('home') }}";
    }

    function submitFeedback() {
        // Here you would normally send data to Flask
        alert("Thank you for your feedback!");
        // closeFeedback(); // Close modal after submit
        window.location.href = "{{ url_for('home') }}";
    }
</script>
</html>

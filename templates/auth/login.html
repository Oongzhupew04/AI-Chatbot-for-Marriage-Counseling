<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MarriageCounselor.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/login.css') }}">
</head>
<body>

    <div class="bg-blob"></div>

    <div class="login-card">
        <div class="brand">
            <i class="fas fa-heart-pulse"></i>
            <span>Counselor.AI</span>
        </div>

        <div class="header">
            <h1>Welcome Back</h1>
            <p>Please enter your details to sign in.</p>
        </div>

        <button class="btn-google">
            <!-- <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="20" style="margin-right: 8px;"> -->
            <i class="fa-brands fa-google"></i>
            Sign in with Google
        </button>

        <div class="divider">
            <span>or sign in with email</span>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="vincent@mmu.edu.my" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>

            <div class="disclaimer-box">
                <input type="checkbox" id="consent" name="consent" required>
                <label for="consent">
                    I understand this AI provides emotional support, not professional therapy. In emergencies, I will contact local authorities.
                </label>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="footer-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create free account</a></p>
            <p style="margin-top: 8px;"><a href="/forgot-password" style="font-weight: 500; color: var(--text-muted); font-size: 0.85rem;">Forgot password?</a></p>
        </div>
    </div>

</body>
</html>

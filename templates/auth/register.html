<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account - MarriageCounselor.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/register.css') }}">
</head>
<body>

    <div class="bg-blob"></div>

    <div class="register-card">
        <div class="brand">
            <i class="fas fa-heart-pulse"></i>
            <span>Counselor.AI</span>
        </div>

        <div class="header">
            <h1>Create your account</h1>
            <p>Start your journey towards a healthier relationship.</p>
        </div>

        <button class="btn-google">
            <!-- <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="20" style="margin-right: 8px;"> -->
            <i class="fa-brands fa-google"></i>
            Sign up with Google
        </button>

        <div class="divider">
            <span>or sign up manually</span>
        </div>

        <form action="/register" method="POST">
            
            <div class="form-group">
                <label for="username">Username / Full Name</label>
                <input type="text" id="username" name="username" class="input-field" placeholder="Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="email_address@gmail.com" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="input-field" placeholder="••••••••" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="privacy_policy" name="privacy_policy" required>
                <label for="privacy_policy">
                    I agree to the <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>.
                </label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="ai_consent" name="ai_consent" required>
                <label for="ai_consent">
                    I consent to AI-assisted emotional support and understand this does not replace professional therapy.
                </label>
            </div>

            <div class="error-message" id="error_box"></div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>Create Account</button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        </div>
    </div>

</body>
<script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const submitBtn = document.getElementById('submitBtn');
    const errorDisplay = document.getElementById('error_box');
    const privacyCheck = document.getElementById('privacy_policy');
    const aiConsentCheck = document.getElementById('ai_consent');

    function validateForm() {
        const email = emailInput.value;
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        let errorMessage = "";
        let isValid = true;
        let isConfirmPasswordValid = false;

        // 1. Email check
        if (!email.includes('@')) {
            errorMessage = "Email Address must contain an '@' symbol.";
            isValid = false;
        }
        
        // 2. Password rules
        if (password.length > 0) { // Only check if they started typing
            if (password.length < 8) {
                errorMessage = "Password must be at least 8 characters.";
                isValid = false;
            } else if (!/[A-Z]/.test(password)) {
                errorMessage = "Password must contain an uppercase letter.";
                isValid = false;
            } else if (!/[a-z]/.test(password)) {
                errorMessage = "Password must contain a lowercase letter.";
                isValid = false;
            } else if (!/[0-9]/.test(password)) {
                errorMessage = "Password must contain a number.";
                isValid = false;
            }
        } else {
            isValid = false;
        }

        // 3. Confirm password check
        if (confirm.length > 0 && password !== confirm) {
            errorMessage = "Password and Confirm Password do not match!";
            isValid = false;
        }
        else if (confirm.length > 0 && password == confirm) {
            isConfirmPasswordValid = true;
            
        }

        // 4. Terms and consent check
        if (isConfirmPasswordValid && (!privacyCheck.checked || !aiConsentCheck.checked)) {
            errorMessage = "You must accept the terms and AI consent.";
            isValid = false;
        }

        // Display error message
        errorDisplay.innerText = errorMessage;

        // Enable or disable the button
        if (isValid && password === confirm) {
            submitBtn.disabled = false;
            submitBtn.style.background = "#000000"; // Turn button black
            submitBtn.style.cursor = "pointer";
        }
    }

    // Run the validation every time the user types a key
    emailInput.addEventListener('input', validateForm);
    emailInput.addEventListener('change', validateForm);
    passwordInput.addEventListener('input', validateForm);
    passwordInput.addEventListener('change', validateForm);
    confirmInput.addEventListener('input', validateForm);
    confirmInput.addEventListener('change', validateForm);

    privacyCheck.addEventListener('change', validateForm);
    aiConsentCheck.addEventListener('change', validateForm);
</script>
</html>

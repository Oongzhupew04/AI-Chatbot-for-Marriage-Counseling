version: '3.8'

services:
  frontend:
    build:
      context: ./1-frontend-react
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build:
      context: ./2-gateway-node
      # Assuming your production build might use a different Dockerfile, 
      # e.g., dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Singapore
      - PYTHON_SERVICE_URL=http://ai-service:8000
      - DB_HOST=opengauss-db
      - NODE_ENV=production
    volumes:
      - gateway-uploads:/app/uploads
    depends_on:
      - ai-service
      - opengauss-db
    restart: unless-stopped

  ai-service:
    build:
      context: ./3-ai-service-python
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Singapore
      - DB_HOST=opengauss-db
      - DB_PORT=5432
      - DB_NAME=ad1
      - DB_USER=ogc
      - DB_PASSWORD=${DB_PASSWORD:-your_db_password}
      - DB_JAR_PATH=opengauss-jdbc-6.0.3.jar
      - HF_TOKEN=${HF_TOKEN:-your_hf_token}
      - JAVA_TOOL_OPTIONS=-Dstdout.encoding=UTF-8 -Dstderr.encoding=UTF-8 --enable-native-access=ALL-UNNAMED
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-vincentoong12345@gmail.com}
      - SMTP_PASS=${SMTP_PASS:-your_smtp_app_password}
      - AES_ENCRYPTION_KEY=${AES_ENCRYPTION_KEY:-your_aes_key}
    depends_on:
      - opengauss-db
    restart: unless-stopped

  opengauss-db:
    build: ./custom_db
    privileged: true
    environment:
      - TZ=Asia/Singapore
      - GS_PASSWORD=YourStrongPassword123! # Ensure you change this to a secure password
    ports:
      - "5432:5432" # Optional: Expose port for local administration
    volumes:
      - opengauss-data:/var/lib/opengauss
    restart: unless-stopped

volumes:
  opengauss-data:
  gateway-uploads:
